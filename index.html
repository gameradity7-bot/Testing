<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paisa Tracker - Smart Finance</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans overflow-x-hidden">

    <div id="landing-page" class="min-h-screen flex flex-col items-center justify-center p-6 relative">
        
        <div class="transform hover:scale-105 transition duration-500 hover:rotate-3 shadow-[0_20px_50px_rgba(8,_112,_184,_0.7)] bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 mb-10 text-center">
            <h1 class="text-4xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-600">Smart AI Expense Tracker</h1>
            <p class="text-gray-300 mb-6">Apne kharche track karein automatically. Zero cost, 100% private.</p>
            
            <button id="install-btn" class="bg-gradient-to-r from-blue-600 to-cyan-500 px-8 py-3 rounded-full font-bold shadow-lg shadow-cyan-500/50 hover:shadow-cyan-500/80 transition-all">
                Install App (Free)
            </button>
        </div>

    </div>

    <div id="app-dashboard" class="hidden min-h-screen p-4 bg-gray-950">
        <h2 class="text-2xl font-bold">Welcome to Dashboard</h2>
    </div>

    <script>
        // Yahan PWA install logic aur landing-to-app switch karne ka code aayega
        const installBtn = document.getElementById('install-btn');
        installBtn.addEventListener('click', () => {
            // iOS instruction alert ya Android install prompt
            alert("iOS: Tap Share -> Add to Home Screen. \nAndroid: Install popup will appear.");
            
            // Testing ke liye Dashboard open karne ka logic
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('app-dashboard').classList.remove('hidden');
        });
    </script>
</body>
</html>
